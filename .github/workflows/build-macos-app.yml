name: Build macOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-darwin,x86_64-apple-darwin
    
    - name: Install Tauri CLI
      run: cargo install tauri-cli
    
    - name: Create Tauri app structure
      run: |
        mkdir -p tauri-app/src
        mkdir -p tauri-app/src-tauri
        
        # Copy web files to src
        cp index.html packs.html mcleaner.html converter.html tauri-app/src/
        cp styles.css theme.js nav.js packs.js mcleaner.js tauri-app/src/
        cp -r packs tauri-app/src/ 2>/dev/null || true
        cp -r vendor tauri-app/src/ 2>/dev/null || true
    
    - name: Create package.json
      run: |
        cat > tauri-app/package.json << 'EOF'
        {
          "name": "google-docs",
          "version": "1.0.0",
          "description": "Minecraft Pack Tools",
          "scripts": {
            "tauri": "tauri"
          }
        }
        EOF
    
    - name: Create Tauri config
      run: |
        cat > tauri-app/src-tauri/tauri.conf.json << 'EOF'
        {
          "build": {
            "beforeDevCommand": "",
            "beforeBuildCommand": "",
            "devPath": "../src",
            "distDir": "../src"
          },
          "package": {
            "productName": "Google Docs",
            "version": "1.0.0"
          },
          "tauri": {
            "allowlist": {
              "all": false,
              "shell": {
                "all": false,
                "open": true
              },
              "window": {
                "all": false,
                "close": true,
                "hide": true,
                "show": true,
                "maximize": true,
                "minimize": true,
                "unmaximize": true,
                "unminimize": true,
                "startDragging": true
              }
            },
            "bundle": {
              "active": true,
              "targets": ["dmg"],
              "identifier": "com.googledocs.packtools",
              "icon": [],
              "resources": [],
              "externalBin": [],
              "copyright": "",
              "category": "Utility",
              "shortDescription": "Minecraft Pack Tools",
              "longDescription": "Clean, convert, and manage Minecraft texture packs",
              "macOS": {
                "minimumSystemVersion": "10.13"
              }
            },
            "security": {
              "csp": null
            },
            "windows": [
              {
                "fullscreen": false,
                "resizable": true,
                "title": "Google Docs",
                "width": 1200,
                "height": 800,
                "url": "index.html"
              }
            ]
          }
        }
        EOF
    
    - name: Create Cargo.toml
      run: |
        cat > tauri-app/src-tauri/Cargo.toml << 'EOF'
        [package]
        name = "google-docs"
        version = "1.0.0"
        description = "Minecraft Pack Tools"
        authors = ["Google Docs"]
        license = ""
        repository = ""
        edition = "2021"

        [build-dependencies]
        tauri-build = { version = "1.5", features = [] }

        [dependencies]
        tauri = { version = "1.5", features = ["shell-open"] }
        serde = { version = "1.0", features = ["derive"] }
        serde_json = "1.0"

        [features]
        default = ["custom-protocol"]
        custom-protocol = ["tauri/custom-protocol"]
        EOF
    
    - name: Create build.rs
      run: |
        cat > tauri-app/src-tauri/build.rs << 'EOF'
        fn main() {
          tauri_build::build()
        }
        EOF
    
    - name: Create main.rs
      run: |
        cat > tauri-app/src-tauri/src/main.rs << 'EOF'
        #![cfg_attr(not(debug_assertions), windows_subsystem = "windows")]

        fn main() {
          tauri::Builder::default()
            .run(tauri::generate_context!())
            .expect("error while running tauri application");
        }
        EOF
    
    - name: Build Tauri app (Universal Binary)
      working-directory: tauri-app/src-tauri
      run: cargo tauri build --target universal-apple-darwin
    
    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-dmg
        path: tauri-app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
        retention-days: 30
