name: Build macOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm install -g electron electron-builder
    
    - name: Create Electron app structure
      run: |
        mkdir -p electron-app/vendor
        # Copy necessary files
        cp index.html packs.html mcleaner.html converter.html electron-app/ 2>/dev/null || true
        cp styles.css theme.js nav.js mcleaner.js electron-app/ 2>/dev/null || true
        # Copy vendor files if they exist
        if [ -d "vendor" ]; then
          cp -r vendor electron-app/ 2>/dev/null || true
        fi
    
    - name: Convert packs to base64 and generate packs.js
      run: |
        cat > electron-app/packs.js << 'PACKS_START'
        // Packs data with base64 encoded files
        const PACKS = [
        PACKS_START
        
        first=true
        for file in packs/*.zip; do
          if [ -f "$file" ]; then
            filename=$(basename "$file")
            base64data=$(base64 -i "$file")
            
            # Extract pack name from filename
            packname="${filename%.zip}"
            packname="${packname%_1.12.2}"
            packname="${packname%_1.12}"
            
            if [ "$first" = false ]; then
              echo "," >> electron-app/packs.js
            fi
            first=false
            
            cat >> electron-app/packs.js << PACK_ENTRY
            {
              name: "$packname",
              file: "$filename",
              data: "data:application/zip;base64,$base64data",
              downloads: $((RANDOM % 15000 + 1000)),
              added: "2024-0$((RANDOM % 4 + 1))-$((RANDOM % 28 + 1))"
            }
        PACK_ENTRY
          fi
        done
        
        cat >> electron-app/packs.js << 'PACKS_END'
        ];

        // State
        let filteredPacks = [...PACKS];
        let currentSort = 'newest';

        // Clean pack name (remove Minecraft color codes)
        function cleanName(name) {
            return name.replace(/§[0-9a-fk-or]/gi, '');
        }

        // Format number with commas
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        // Display packs
        function displayPacks(packs) {
            const grid = document.getElementById('packsGrid');
            const noResults = document.getElementById('noResults');
            const resultsCount = document.getElementById('resultsCount');
            
            grid.innerHTML = '';
            
            if (packs.length === 0) {
                grid.style.display = 'none';
                noResults.style.display = 'block';
                resultsCount.textContent = '';
                return;
            }
            
            grid.style.display = 'grid';
            noResults.style.display = 'none';
            resultsCount.textContent = `${packs.length} pack${packs.length !== 1 ? 's' : ''}`;
            
            packs.forEach((pack) => {
                const card = document.createElement('div');
                card.className = 'pack-card';
                
                const displayName = cleanName(pack.name);
                const isLegacy = pack.file.includes('1.12');
                const version = isLegacy ? '1.12.2' : '1.21+';
                
                card.innerHTML = `
                    <div class="pack-badges">
                        <span class="pack-resolution">${version}</span>
                    </div>
                    <h3 class="pack-title">${displayName}</h3>
                    <div class="pack-stats">${formatNumber(pack.downloads)} downloads</div>
                    <div class="pack-actions">
                        <a href="${pack.data}" class="btn btn-primary" download="${pack.file}">Download</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Search packs
        function searchPacks(query) {
            const lowerQuery = query.toLowerCase().trim();
            
            if (!lowerQuery) {
                filteredPacks = [...PACKS];
            } else {
                filteredPacks = PACKS.filter(pack => {
                    const cleanedName = cleanName(pack.name).toLowerCase();
                    return cleanedName.includes(lowerQuery) || pack.file.toLowerCase().includes(lowerQuery);
                });
            }
            
            sortPacks(currentSort);
        }

        // Sort packs
        function sortPacks(sortType) {
            currentSort = sortType;
            
            if (sortType === 'downloads') {
                filteredPacks.sort((a, b) => b.downloads - a.downloads);
            } else {
                // newest
                filteredPacks.sort((a, b) => new Date(b.added) - new Date(a.added));
            }
            
            displayPacks(filteredPacks);
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', function() {
            // Initial load
            sortPacks('newest');
            
            // Search
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                searchPacks(e.target.value);
            });
            
            // Sort buttons
            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    sortPacks(btn.dataset.sort);
                });
            });
        });
        PACKS_END
        
    - name: Create package.json
      run: |
        cat > electron-app/package.json << 'EOF'
        {
          "name": "google-docs",
          "version": "1.0.0",
          "description": "Minecraft Pack Tools",
          "main": "electron-main.js",
          "author": "Google Docs",
          "scripts": {
            "start": "electron .",
            "build": "electron-builder --mac"
          },
          "build": {
            "appId": "com.googledocs.packtools",
            "productName": "Google Docs",
            "mac": {
              "category": "public.app-category.utilities",
              "target": [
                {
                  "target": "dmg",
                  "arch": ["x64", "arm64"]
                }
              ],
              "minimumSystemVersion": "10.13"
            },
            "dmg": {
              "title": "Google Docs",
              "window": {
                "width": 540,
                "height": 380
              }
            },
            "files": [
              "electron-main.js",
              "*.html",
              "*.css",
              "*.js",
              "vendor/**/*",
              "!node_modules/**/*",
              "!.git/**/*",
              "!.github/**/*",
              "!.vscode/**/*",
              "!*.md"
            ],
            "asarUnpack": [],
            "compression": "maximum",
            "electronCompile": false,
            "removePackageScripts": true,
            "npmRebuild": false
          },
          "devDependencies": {
            "electron": "^28.0.0",
            "electron-builder": "^24.9.1"
          }
        }
        EOF
    
    - name: Create Electron main file
      run: |
        cat > electron-app/electron-main.js << 'EOF'
        const { app, BrowserWindow } = require('electron');
        const path = require('path');

        function createWindow() {
          const win = new BrowserWindow({
            width: 1200,
            height: 800,
            webPreferences: {
              nodeIntegration: false,
              contextIsolation: true
            },
            titleBarStyle: 'hiddenInset'
          });

          win.loadFile('index.html');
          
          // Handle navigation to other pages
          win.webContents.on('will-navigate', (event, url) => {
            event.preventDefault();
            
            // Check if it's an external URL
            if (url.startsWith('http://') || url.startsWith('https://')) {
              // Load external URLs in the same window
              win.loadURL(url);
            } else if (url.includes('/packs')) {
              win.loadFile('packs.html');
            } else if (url.includes('/mcleaner')) {
              win.loadFile('mcleaner.html');
            } else if (url.includes('/converter')) {
              win.loadFile('converter.html');
            } else if (url.includes('/') || url.includes('index')) {
              win.loadFile('index.html');
            }
          });
          
          // Handle link clicks
          win.webContents.setWindowOpenHandler(({ url }) => {
            // Load external links in the same window
            if (url.startsWith('http://') || url.startsWith('https://')) {
              win.loadURL(url);
              return { action: 'deny' };
            }
            
            if (url.includes('/packs')) {
              win.loadFile('packs.html');
            } else if (url.includes('/mcleaner')) {
              win.loadFile('mcleaner.html');
            } else if (url.includes('/converter')) {
              win.loadFile('converter.html');
            } else if (url.includes('/') || url.includes('index')) {
              win.loadFile('index.html');
            }
            return { action: 'deny' };
          });
          
          // Handle keyboard shortcuts
          win.webContents.on('before-input-event', (event, input) => {
            // Option+B or Alt+B to go back to index
            if (input.alt && input.key === 'b') {
              win.loadFile('index.html');
            }
          });
        }

        app.whenReady().then(() => {
          createWindow();

          app.on('activate', () => {
            if (BrowserWindow.getAllWindows().length === 0) {
              createWindow();
            }
          });
        });

        app.on('window-all-closed', () => {
          if (process.platform !== 'darwin') {
            app.quit();
          }
        });
        EOF
    
    - name: Install app dependencies
      working-directory: electron-app
      run: npm install
    
    - name: Build macOS app
      working-directory: electron-app
      run: npm run build
      env:
        CSC_IDENTITY_AUTO_DISCOVERY: false
        DEBUG: electron-builder
    
    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-dmg
        path: electron-app/dist/*.dmg
        retention-days: 30
