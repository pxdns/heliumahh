name: Build macOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm install -g electron electron-builder
    
    - name: Create Electron app structure
      run: |
        mkdir -p electron-app
        cp -r *.html *.js *.css packs electron-app/ 2>/dev/null || true
        
    - name: Create package.json
      run: |
        cat > electron-app/package.json << 'EOF'
        {
          "name": "google-docs",
          "version": "1.0.0",
          "description": "Minecraft Pack Tools",
          "main": "electron-main.js",
          "author": "Google Docs",
          "scripts": {
            "start": "electron .",
            "build": "electron-builder --mac"
          },
          "build": {
            "appId": "com.googledocs.packtools",
            "productName": "Google Docs",
            "mac": {
              "category": "public.app-category.utilities",
              "target": [
                {
                  "target": "dmg",
                  "arch": ["x64", "arm64"]
                }
              ]
            },
            "dmg": {
              "title": "Google Docs",
              "window": {
                "width": 540,
                "height": 380
              }
            },
            "files": [
              "**/*",
              "!node_modules/**/*"
            ]
          },
          "devDependencies": {
            "electron": "^28.0.0",
            "electron-builder": "^24.9.1"
          }
        }
        EOF
    
    - name: Create Electron main file
      run: |
        cat > electron-app/electron-main.js << 'EOF'
        const { app, BrowserWindow } = require('electron');
        const path = require('path');

        function createWindow() {
          const win = new BrowserWindow({
            width: 1200,
            height: 800,
            webPreferences: {
              nodeIntegration: false,
              contextIsolation: true
            },
            titleBarStyle: 'hiddenInset'
          });

          win.loadFile('index.html');
          
          // Handle navigation to other pages
          win.webContents.on('will-navigate', (event, url) => {
            event.preventDefault();
            
            // Check if it's an external URL
            if (url.startsWith('http://') || url.startsWith('https://')) {
              // Load external URLs in the same window
              win.loadURL(url);
            } else if (url.includes('/packs')) {
              win.loadFile('packs.html');
            } else if (url.includes('/mcleaner')) {
              win.loadFile('mcleaner.html');
            } else if (url.includes('/converter')) {
              win.loadFile('converter.html');
            } else if (url.includes('/') || url.includes('index')) {
              win.loadFile('index.html');
            }
          });
          
          // Handle link clicks
          win.webContents.setWindowOpenHandler(({ url }) => {
            // Load external links in the same window
            if (url.startsWith('http://') || url.startsWith('https://')) {
              win.loadURL(url);
              return { action: 'deny' };
            }
            
            if (url.includes('/packs')) {
              win.loadFile('packs.html');
            } else if (url.includes('/mcleaner')) {
              win.loadFile('mcleaner.html');
            } else if (url.includes('/converter')) {
              win.loadFile('converter.html');
            } else if (url.includes('/') || url.includes('index')) {
              win.loadFile('index.html');
            }
            return { action: 'deny' };
          });
          
          // Handle keyboard shortcuts
          win.webContents.on('before-input-event', (event, input) => {
            // Option+B or Alt+B to go back to index
            if (input.alt && input.key === 'b') {
              win.loadFile('index.html');
            }
          });
        }

        app.whenReady().then(() => {
          createWindow();

          app.on('activate', () => {
            if (BrowserWindow.getAllWindows().length === 0) {
              createWindow();
            }
          });
        });

        app.on('window-all-closed', () => {
          if (process.platform !== 'darwin') {
            app.quit();
          }
        });
        EOF
    
    - name: Install app dependencies
      working-directory: electron-app
      run: npm install
    
    - name: Build macOS app
      working-directory: electron-app
      run: npm run build
      env:
        CSC_IDENTITY_AUTO_DISCOVERY: false
    
    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-dmg
        path: electron-app/dist/*.dmg
        retention-days: 30
