<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packs - Ahhydrogen</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">Ahhydrogen</a>
            <div class="nav-links">
                <a href="/packs" class="nav-link active">Packs</a>
                <a href="/mcleaner" class="nav-link">Cleaner</a>
            </div>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
                <span class="icon-moon">🌙</span>
                <span class="icon-sun">☀️</span>
            </button>
        </div>
    </nav>

    <main class="page-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">Texture Packs</h1>
                <p class="page-subtitle">PvP packs, overlays, and utilities</p>
            </div>
            
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Search packs...">
            </div>

            <div class="filters">
                <button class="filter-btn active" data-sort="newest">Newest</button>
                <button class="filter-btn" data-sort="downloads">Most Downloaded</button>
            </div>

            <div id="resultsCount" class="results-count"></div>

            <div id="packsGrid" class="packs-grid"></div>

            <div id="noResults" class="no-results" style="display: none;">
                <p>No packs found.</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2024 Ahhydrogen</p>
        </div>
    </footer>

    <script src="theme.js"></script>
    <script src="packs.js"></script>
</body>
</html>
